<p class="font-body-lg text-body-lg text-on-surface-variant max-w-xl">
                    Select the traits that best describe your academic habits. This helps us match you with peers who complement your workflow.
                </p>
</div>
<!-- Bento Grid for Traits -->
<div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 mb-12">
<!-- Trait 1 -->
<button class="trait-badge group flex flex-col items-center justify-center p-6 bg-[#001d3d] rounded-xl border border-[#003566] hover:border-[#004080] transition-all duration-300 relative overflow-hidden focus:outline-none focus:ring-2 focus:ring-secondary-container" type="button">
<div class="absolute inset-0 bg-gradient-to-br from-white/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
<span class="icon-container material-symbols-outlined text-4xl mb-3 text-on-surface-variant transition-colors group-hover:text-white" style="font-variation-settings: 'FILL' 0;">dark_mode</span>
<span class="font-label-sm text-label-sm text-white uppercase tracking-widest">Night Owl</span>
</button>

<div class="absolute inset-0 bg-gradient-to-br from-white/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>

</main>
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const badges = document.querySelectorAll('.trait-badge');
            
            badges.forEach(badge => {
                badge.addEventListener('click', () => {
                    badge.classList.toggle('selected');
                    const icon = badge.querySelector('.icon-container');
                    
                    // Toggle fill state on the material symbol when selected
                    if (badge.classList.contains('selected')) {
                        icon.style.fontVariationSettings = "'FILL' 1";
                    } else {
                        icon.style.fontVariationSettings = "'FILL' 0";
                    }
                });
            });
        });
    </script>
