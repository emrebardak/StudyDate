<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>StudyMatch - Academic Profile</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-container-highest": "#2a3643",
                    "on-secondary-fixed-variant": "#554600",
                    "on-primary-container": "#6d5200",
                    "surface-variant": "#2a3643",
                    "secondary-fixed": "#ffe171",
                    "outline-variant": "#4f4632",
                    "inverse-on-surface": "#26313f",
                    "primary": "#ffe5b2",
                    "on-tertiary-fixed-variant": "#1e4879",
                    "on-background": "#d7e3f5",
                    "inverse-surface": "#d7e3f5",
                    "on-tertiary": "#00315f",
                    "on-secondary-fixed": "#221b00",
                    "surface": "#081421",
                    "secondary-container": "#fad100",
                    "surface-container-low": "#101c29",
                    "on-tertiary-fixed": "#001c3a",
                    "surface-bright": "#2e3a48",
                    "primary-fixed": "#ffdf9a",
                    "surface-container-lowest": "#040f1b",
                    "primary-fixed-dim": "#f8be00",
                    "on-error-container": "#ffdad6",
                    "background": "#081421",
                    "on-surface-variant": "#d3c5ab",
                    "on-surface": "#d7e3f5",
                    "tertiary-container": "#afceff",
                    "secondary-fixed-dim": "#e9c400",
                    "inverse-primary": "#785a00",
                    "tertiary-fixed": "#d4e3ff",
                    "on-secondary-container": "#6d5a00",
                    "error-container": "#93000a",
                    "on-error": "#690005",

                    "secondary": "#fff0c4",
                    "tertiary": "#dee9ff",
                    "on-tertiary-container": "#30578a",
                    "on-primary-fixed-variant": "#5a4300",
                    "tertiary-fixed-dim": "#a5c8ff",
                    "error": "#ffb4ab",
                    "primary-container": "#ffc300",
                    "surface-dim": "#081421",
                    "on-secondary": "#3b2f00",

                    "outline": "#9c8f78"

            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",

            },
            "spacing": {
                    "gutter": "24px",
                    "margin-desktop": "48px",
                    "container-max": "1280px",
                    "margin-mobile": "16px",
                    "base": "8px"
            },
            "fontFamily": {
                    "display-lg": ["\"Source Serif 4\""],
                    "title-md": ["Hanken Grotesk"],
                    "body-lg": ["Hanken Grotesk"],
                    "label-sm": ["JetBrains Mono"],
                    "headline-lg": ["\"Source Serif 4\""],
                    "headline-lg-mobile": ["\"Source Serif 4\""],

            },
            "fontSize": {

          }
        }
      }

<style>
        .glass-panel {
            background: linear-gradient(145deg, rgba(21, 32, 45, 0.95) 0%, rgba(8, 20, 33, 0.98) 100%);
            backdrop-filter: blur(16px);
        }
        
        .bg-pattern {
            background-image: radial-gradient(rgba(255, 195, 0, 0.05) 1px, transparent 1px);
            background-size: 24px 24px;
        }

        /* Material Symbols Outline Settings */
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col relative bg-pattern">
<!-- Atmospheric Background Image -->
<div class="absolute inset-0 z-0 bg-cover bg-center opacity-20 mix-blend-overlay pointer-events-none" data-alt="A blurred, cinematic dark academia background featuring towering wooden library bookshelves cast in deep shadows. A single, distinct beam of warm golden light cuts through the darkness, illuminating floating dust motes and creating an atmosphere of intense scholarly focus and elite institutional prestige. The color palette emphasizes rich, deep blues and glowing yellow accents." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBoS5JsCXgL7xKSjj9RFkLNXSSXzBFpKv1_k28GXHc5gbPhku7KRhueZQlRWxoziLyqWcVdUMpoWfbvyOX2nuBQsWI-mYNBGClHFekUFcHGl-dOU3cyZbzHGj7psRQnCYUoV81BZQOqedDi5eNrhz1o--dXcGpvrBkwuRYXFC7VvnjD70yTxfcfaYTp9jXEYWMqa3NNzenWIZe-Bfsjdquz2wff89-UBhiDmN9yaD6-q55keKIHWIsNUEU66fL9dSQD83Ej0ZSsN8E')"></div>
<!-- Main Content Canvas (Transactional Flow - No Nav Shell) -->
<main class="flex-grow flex items-center justify-center p-margin-mobile md:p-margin-desktop relative z-10 w-full max-w-container-max mx-auto">
<!-- Registration Card Container -->
<div class="glass-panel border border-outline/30 rounded-xl w-full max-w-lg p-margin-mobile md:p-10 shadow-[0_0_40px_rgba(0,0,0,0.5)]">
<!-- Progress Indicator -->
<div class="mb-10">
<div class="flex justify-between items-end mb-3">
<span class="font-label-sm text-label-sm text-primary-container uppercase tracking-widest">Step 2 of 4</span>
<span class="font-label-sm text-label-sm text-on-surface-variant">Profile Setup</span>
</div>
<div class="w-full h-1.5 bg-surface-container-highest rounded-full overflow-hidden">
<div class="h-full bg-primary-container w-2/4 rounded-full shadow-[0_0_8px_rgba(255,195,0,0.6)] transition-all duration-700 ease-out"></div>
</div>
</div>
<!-- Header -->
<div class="mb-10 text-center">
<span class="material-symbols-outlined text-primary-container text-4xl mb-4 inline-block" style="font-variation-settings: 'FILL' 1;">school</span>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-on-background mb-2">Academic Profile</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Define your academic identity to match with elite study sessions.</p>
</div>
<!-- Form Flow -->
<form class="space-y-8" onsubmit="event.preventDefault();">
<!-- Full Name Field -->
<div class="relative group">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest block mb-2 transition-colors group-focus-within:text-primary-container" for="fullName">Full Legal Name</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-0 text-on-surface-variant group-focus-within:text-primary-container transition-colors pb-2">person</span>
<input class="w-full bg-transparent border-b-2 border-outline-variant focus:border-primary-container focus:outline-none focus:ring-0 text-on-surface font-body-lg text-body-lg pb-2 pl-8 transition-colors placeholder:text-on-surface-variant/50" id="fullName" placeholder="Jane Doe" type="text"/>
</div>
</div>
<!-- University Field -->
<div class="relative group">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest block mb-2 transition-colors group-focus-within:text-primary-container" for="university">Institution / University</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-0 text-on-surface-variant group-focus-within:text-primary-container transition-colors pb-2">account_balance</span>
<input class="w-full bg-transparent border-b-2 border-outline-variant focus:border-primary-container focus:outline-none focus:ring-0 text-on-surface font-body-lg text-body-lg pb-2 pl-8 transition-colors placeholder:text-on-surface-variant/50" id="university" placeholder="e.g. Stanford University" type="text"/>
</div>
</div>
<!-- Department Field -->
<div class="relative group">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest block mb-2 transition-colors group-focus-within:text-primary-container" for="department">Primary Department</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-0 text-on-surface-variant group-focus-within:text-primary-container transition-colors pb-2">science</span>
<select class="w-full bg-transparent border-b-2 border-outline-variant focus:border-primary-container focus:outline-none focus:ring-0 text-on-surface font-body-lg text-body-lg pb-2 pl-8 appearance-none transition-colors cursor-pointer" id="department">
<option class="bg-surface-container text-on-surface-variant" disabled="" selected="" value="">Select your department</option>
<option class="bg-surface-container text-on-surface" value="cs">Computer Science</option>
<option class="bg-surface-container text-on-surface" value="eng">Engineering</option>
<option class="bg-surface-container text-on-surface" value="med">Medicine</option>
<option class="bg-surface-container text-on-surface" value="law">Law</option>
<option class="bg-surface-container text-on-surface" value="art">Arts &amp; Humanities</option>
</select>
<span class="material-symbols-outlined absolute right-0 pointer-events-none text-on-surface-variant pb-2">expand_more</span>
</div>
</div>
<!-- Action Area -->
<div class="pt-6 mt-10 flex flex-col gap-4 border-t border-outline/20">
<button class="w-full bg-primary-container text-on-primary-container font-body-lg text-body-lg font-bold py-4 rounded-lg hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
                        Continue to Specialization
                        <span class="material-symbols-outlined text-xl">arrow_forward</span>
</button>
<button class="w-full bg-transparent text-on-surface font-body-md text-body-md py-3 rounded-lg hover:text-primary-container hover:bg-surface-container-highest/50 active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="button">
<span class="material-symbols-outlined text-lg">arrow_back</span>
                        Back to Account Setup
                    </button>
</div>
</form>
</div>
</main>
</body></html>
