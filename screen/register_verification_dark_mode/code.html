<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md selection:bg-primary-container selection:text-on-primary-container">
<!-- Progress Bar (Top) -->
<div class="fixed top-0 left-0 w-full h-1 bg-surface-container-high z-50">
<div class="h-full bg-primary-container w-1/4 transition-all duration-500 ease-in-out"></div>
</div>
<!-- TopAppBar (Transactional - Hidden Nav, Brand Only) -->
<nav class="fixed top-0 w-full z-40 bg-background/80 backdrop-blur-xl border-b border-surface-container-high h-16 flex items-center px-margin-mobile md:px-margin-desktop mt-1">
<div class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg font-bold text-primary-container tracking-tighter cursor-pointer flex items-center gap-2">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">school</span>
            StudyMatch
        </div>
<div class="ml-auto">
<button class="text-on-background hover:text-primary-container transition-colors p-2 rounded-full hover:bg-surface-container-low focus:outline-none focus:ring-2 focus:ring-primary-container">
<span class="material-symbols-outlined">close</span>
</button>
</div>
</nav>
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center p-margin-mobile md:p-margin-desktop pt-24 md:pt-32">
<div class="w-full max-w-md">
<!-- Context & Greeting -->
<div class="text-center mb-8">
<h1 class="font-display-lg text-display-lg text-on-surface mb-2">Step 1</h1>
<p class="font-title-md text-title-md text-on-surface-variant">Academic Verification</p>
<p class="font-body-md text-body-md text-on-background/70 mt-4 max-w-xs mx-auto">
                    To maintain our academic integrity, please verify your institutional email address.
                </p>
</div>
<!-- Prussian Blue Input Card -->
<div class="bg-surface-container-low border border-on-tertiary-container/30 rounded-xl p-8 relative overflow-hidden group">
<!-- Decorative accent glow -->
<div class="absolute -top-10 -right-10 w-32 h-32 bg-primary-container/10 blur-3xl rounded-full pointer-events-none group-hover:bg-primary-container/20 transition-all duration-500"></div>
<form action="#" class="relative z-10 space-y-6" method="POST">
<div class="space-y-2">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider block" for="edu_email">University Email (.edu, .ac.uk, etc.)</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-on-surface-variant">
<span class="material-symbols-outlined">mail</span>
</span>
<input autocomplete="email" autofocus="" class="w-full bg-surface-container-high text-on-surface border-0 border-b-2 border-on-tertiary-container/50 focus:border-primary-container focus:ring-0 pl-10 py-3 font-body-lg text-body-lg transition-colors placeholder:text-on-surface-variant/50" id="edu_email" name="edu_email" placeholder="student@university.edu" required="" type="email"/>
</div>
<p class="font-label-sm text-label-sm text-on-background/50 mt-1">We'll send a verification link to this address.</p>
</div>
<!-- Continue Button -->
<button class="w-full bg-primary-container hover:bg-primary-fixed text-surface font-title-md text-title-md py-4 px-6 rounded-lg font-bold transition-all active:scale-[0.98] focus:outline-none focus:ring-2 focus:ring-primary-container focus:ring-offset-2 focus:ring-offset-background flex items-center justify-center gap-2 mt-4 shadow-[0_0_15px_rgba(255,195,0,0.15)] hover:shadow-[0_0_20px_rgba(255,195,0,0.25)]" type="submit">
                        Continue
                        <span class="material-symbols-outlined">arrow_forward</span>
</button>
</form>
</div>
<!-- Alternative Action -->
<div class="text-center mt-8">
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary-container transition-colors underline-offset-4 hover:underline" href="#">
                    Having trouble? Contact Support
                </a>
</div>
</div>
</main>
<!-- Decorative background elements for dark mode depth -->
<div class="fixed inset-0 pointer-events-none z-[-1] overflow-hidden">
<div class="absolute top-1/4 left-1/4 w-96 h-96 bg-tertiary-container/5 blur-[120px] rounded-full mix-blend-screen"></div>
<div class="absolute bottom-1/4 right-1/4 w-[500px] h-[500px] bg-primary-container/5 blur-[150px] rounded-full mix-blend-screen"></div>
